name: CI

on:
  pull_request:
  workflow_call:

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run UI tests
        run: npm run test:run -- --reporter=junit --outputFile=tests/ui/test-results.xml

      - name: Publish UI test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: UI Tests
          path: tests/ui/test-results.xml
          reporter: jest-junit

      - name: Build
        run: npm run build
        env:
          VITE_STORAGE_BACKEND: api
          VITE_API_BASE_URL: http://localhost:5062

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    name: API — build & test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build API
        run: dotnet build src/api/

      - name: Run tests (excluding E2E Cosmos tests)
        run: dotnet test tests/api/ --filter "Category!=EndToEnd" --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API Tests
          path: tests/api/TestResults/*.trx
          reporter: dotnet-trx

  # ── E2E Cosmos tests (PRs and main) ───────────────────────────────────────
  e2e:
    name: API — E2E Cosmos tests
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || github.ref == 'refs/heads/main'
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Start Cosmos DB emulator
        run: |
          docker run -d --name cosmos-emulator -p 8081:8081 \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for Cosmos emulator..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8081/ > /dev/null 2>&1; then
              echo "Emulator ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Emulator failed to start within 120s"
          exit 1

      - name: Run E2E tests
        run: dotnet test tests/api/ --filter "Category=EndToEnd" --logger "trx;LogFileName=e2e-results.trx"

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API E2E Tests
          path: tests/api/TestResults/*.trx
          reporter: dotnet-trx
