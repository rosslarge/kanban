name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:

env:
  TF_STATE_RG: kanban-shared-rg
  TF_STATE_ACCOUNT: kanbantfstate
  TF_STATE_CONTAINER: tfstate

jobs:
  # ── Run the CI pipeline ──────────────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/pipeline.yml
    permissions:
      checks: write
      contents: read

  # ── Terraform — shared layer ─────────────────────────────────────────────
  terraform-shared:
    name: Terraform — shared
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform init
        working-directory: infra/shared
        run: terraform init -backend-config=backend.hcl

      - name: Terraform apply
        working-directory: infra/shared
        run: terraform apply -auto-approve

  # ── Terraform — staging environment ──────────────────────────────────────
  terraform-staging:
    name: Terraform — staging
    needs: terraform-shared
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform init
        working-directory: infra/env
        run: terraform init -backend-config=backend.staging.hcl

      - name: Terraform apply
        working-directory: infra/env
        run: terraform apply -var-file=staging.tfvars -auto-approve

  # ── Build and push the API container image ───────────────────────────────
  build-image:
    name: Build & push API image
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kanban-api
          tags: |
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64

  # ── Deploy API to staging ────────────────────────────────────────────────
  deploy-api-staging:
    name: Deploy API — staging
    if: github.event_name == 'push'
    needs: [build-image, terraform-staging]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ needs.build-image.outputs.image-tag }}

  # ── Deploy frontend to staging ───────────────────────────────────────────
  deploy-web-staging:
    name: Deploy frontend — staging
    if: github.event_name == 'push'
    needs: [build-image, deploy-api-staging]
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_STORAGE_BACKEND: api
          VITE_API_BASE_URL: ${{ vars.API_URL }}

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          skip_api_build: true

  # ── Terraform — production environment (main only) ───────────────────────
  terraform-prod:
    name: Terraform — production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [terraform-shared, deploy-web-staging]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform init
        working-directory: infra/env
        run: terraform init -backend-config=backend.prod.hcl

      - name: Terraform apply
        working-directory: infra/env
        run: terraform apply -var-file=prod.tfvars -auto-approve

  # ── Deploy API to production (main only, manual approval) ────────────────
  deploy-api-prod:
    name: Deploy API — production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-image, terraform-prod]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ needs.build-image.outputs.image-tag }}

  # ── Deploy frontend to production (main only) ───────────────────────────
  deploy-web-prod:
    name: Deploy frontend — production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-image, deploy-api-prod]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_STORAGE_BACKEND: api
          VITE_API_BASE_URL: ${{ vars.API_URL }}

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          skip_api_build: true
