name: Integration Verification

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  e2e:
    name: API — E2E Cosmos tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Start Cosmos DB emulator
        run: |
          docker run -d --name cosmos-emulator -p 8081:8081 \
            mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for Cosmos emulator..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8081/ > /dev/null 2>&1; then
              echo "Emulator ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Emulator failed to start within 120s"
          exit 1

      - name: Run E2E tests
        run: dotnet test tests/api/ --filter "Category=EndToEnd" --logger "trx;LogFileName=e2e-results.trx"

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API E2E Tests
          path: tests/api/TestResults/*.trx
          reporter: dotnet-trx
